name: ESLint Auto-Fix

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ESLint:
    runs-on: ubuntu-latest
    # This permission is required for the bot to save fixed code back to your repo
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install NPM dependencies
        run: npm install

      - name: Run ESLint Fix
        # The --fix flag repairs brackets, semicolons, and spacing automatically
        run: npx eslint src/ --ext .ts,.tsx --fix || true

      - name: Commit Fixed Code
        # This step pushes the "repaired" code back to your branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Bot: Fixed formatting and brackets"
          branch: ${{ github.head_ref || github.ref_name }}
