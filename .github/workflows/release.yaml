name: Publish Release
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
jobs:
  bundle-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.repository.full_name }}
          ref: "master"
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install OpenSSL 1.1
        run: |
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
      - name: Install Rojo
        uses: ok-nick/setup-aftman@v0.4.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Remodel
        run: |
          curl -L --fail --retry 3 --retry-delay 2 \
            https://github.com/rojo-rbx/remodel/releases/download/v0.11.0/remodel-0.11.0-linux-x86_64.zip \
            -o remodel.zip
          unzip remodel.zip
          chmod +x remodel
          sudo mv remodel /usr/local/bin/remodel
      - name: Install NPM dependencies
        run: npm install
      - name: Compile roblox-ts
        run: npm run compile
      - name: Debug compiled output
        run: |
          echo "=== out/ contents ==="
          ls -la out/ || echo "out/ does not exist!"
          echo "=== out/ recursive ==="
          find out/ -type f | sort || echo "find failed"
          echo "=== src/ contents ==="
          ls -la src/
          echo "=== App.lua check ==="
          cat out/App.lua 2>/dev/null || echo "out/App.lua not found"
          cat out/App/init.lua 2>/dev/null || echo "out/App/init.lua not found either"
      - name: Build model
        run: npm run build
      - name: Debug rbxm contents
        run: |
          echo "=== Havoc.rbxm file size ==="
          ls -la Havoc.rbxm
          remodel run ci/debug-rbxm.lua
      - name: Bundle modules
        run: |
          remodel run ci/bundle.lua Havoc.rbxm public/latest.lua release minify
          remodel run ci/bundle.lua Havoc.rbxm public/latest.debug.lua release-dbg debug
      - name: Commit latest
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          add: "public"
          message: "🔥 Auto-build Release from src push"
          push: '--force'
