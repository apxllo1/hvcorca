name: Publish Release

on:
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  bundle-release:
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.repository.full_name }}
          ref: "master"

      - name: Install Foreman
        run: |
          curl -L https://github.com/Roblox/foreman/releases/download/v1.0.4/foreman-linux.zip -o foreman.zip
          unzip foreman.zip
          chmod +x foreman
          sudo mv foreman /usr/local/bin/foreman
          foreman install

      - name: Install NPM dependencies
        run: npm install

      - name: Compile roblox-ts
        run: npm run compile

      - name: Build model
        run: npm run build

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "tag_name=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=$(git describe --tags --always)" >> $GITHUB_OUTPUT
          fi

      - name: Bundle modules
        run: |
          remodel run ci/bundle.lua public/latest.lua ${{ steps.tag.outputs.tag_name }} minify
          remodel run ci/bundle.lua public/latest.debug.lua ${{ steps.tag.outputs.tag_name }}-dbg debug

      - name: Commit latest
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          add: "['public/latest.lua', 'public/latest.debug.lua']"
          message: 🔴 Release ${{ steps.tag.outputs.tag_name }}
