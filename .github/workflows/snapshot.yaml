name: Publish Nightly Snapshot
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
  schedule:
    - cron: "0 0 * * *"
jobs:
  bundle-snapshot:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "master"
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Install OpenSSL 1.1
        run: |
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
      - name: Install Tools (Aftman)
        uses: ok-nick/setup-aftman@v0.4.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Remodel
        run: |
          curl -L --fail --retry 3 --retry-delay 2 \
            https://github.com/rojo-rbx/remodel/releases/download/v0.11.3/remodel-0.11.3-linux-x86_64.zip \
            -o remodel.zip
          unzip remodel.zip
          chmod +x remodel
          sudo mv remodel /usr/local/bin/remodel
      - name: Install NPM dependencies
        run: npm install
      - name: Compile & Build
        run: |
          npm run compile
          npm run build
      - name: Bundle modules
        run: |
          remodel run ci/bundle.lua Havoc.rbxm public/latest.lua ${{ steps.date.outputs.date }} minify
          remodel run ci/bundle.lua Havoc.rbxm public/latest.debug.lua ${{ steps.date.outputs.date }}-dbg debug
      - name: Commit and Force Sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p public
          git add public/latest.lua public/latest.debug.lua
          if ! git diff --cached --quiet; then
            git commit -m "🔥 Snapshot ${{ steps.date.outputs.date }}"
            git fetch origin master
            git rebase origin/master --autostash
            git push origin master --force
          else
            echo "No changes to commit."
          fi
