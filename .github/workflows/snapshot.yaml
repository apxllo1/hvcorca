name: Publish Nightly Snapshot

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
  schedule:
    - cron: "0 0 * * *"

jobs:
  bundle-snapshot:
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +'%yd%ja')" >> $GITHUB_OUTPUT

      - name: Install OpenSSL 1.1
        run: |
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb

      - name: Install Foreman
        run: |
          curl -L https://github.com/Roblox/foreman/releases/download/v1.0.4/foreman-linux.zip -o foreman.zip
          unzip foreman.zip
          chmod +x foreman
          sudo mv foreman /usr/local/bin/foreman
          foreman install
          echo "$HOME/.foreman/bin" >> $GITHUB_PATH

      - name: Install NPM dependencies
        run: npm install

      - name: Compile roblox-ts
        run: npm run compile

      - name: Build model
        run: npm run build

      - name: Bundle modules
        run: |
          remodel run ci/bundle.lua public/latest.lua ${{ steps.date.outputs.date }} minify
          remodel run ci/bundle.lua public/latest.debug.lua ${{ steps.date.outputs.date }}-dbg debug

      - name: Commit latest
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          add: "['public/latest.lua', 'public/latest.debug.lua']"
          message: 🔥 Snapshot ${{ steps.date.outputs.date }}
